{% extends "base.html" %}
{% block title %}{{ title }} — Watch{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/shaka-player@4.3.5/dist/shaka-player.compiled.min.js"></script>
<style>
.video-box{background:#000;border-radius:16px;overflow:hidden;aspect-ratio:16/9;margin:16px 0;border:1px solid var(--border)}
#player{width:100%;height:100%;min-height:200px}
.msg{padding:16px;text-align:center;color:var(--muted);font-size:14px}
.msg a{color:#a5b4fc;font-weight:700}
</style>
{% endblock %}
{% block header_left %}<a href="javascript:history.back()" class="back-link">← Back</a>{% endblock %}
{% block content %}
<h1 class="page-title" style="font-size:1.15rem;line-height:1.4">{{ title }}</h1>
<div class="video-box"><video id="player" playsinline controls poster=""></video></div>
<div id="msg" class="msg">Loading stream…</div>
{% endblock %}
{% block scripts %}
<script>
(async function(){
  const el=document.getElementById('player'), msg=document.getElementById('msg');
  const q=new URLSearchParams({
    batch_id:{{ batch_id|tojson }},
    subject_id:{{ subject_id|tojson }},
    topic_id:{{ topic_id|tojson }},
    schedule_id:{{ schedule_id|tojson }},
    video_id:{{ video_id|tojson }}
  });
  function showExternal(){
    msg.innerHTML='Stream opens on StudyStark player. <a href="{{ external_play_url }}" target="_blank" rel="noopener">Play lecture ↗</a>';
  }
  try{
    const slides=await(await fetch('/api/v1/video_slides?'+q)).json();
    let url=slides.video_url||slides.hls_url;
    if(!url && slides.success!==false){
      const pl=await(await fetch('/api/v1/playlist?'+q+'&play_type=Lecture')).json();
      const lec=(pl.data||[]).find(x=>x._id==={{ schedule_id|tojson }})||(pl.data||[])[0];
      if(lec&&lec.videoDetails){
        const vid=lec.videoDetails._id||lec.videoDetails.id;
        if(vid){
          const s2=await(await fetch('/api/v1/video_slides?'+new URLSearchParams({batch_id:q.get('batch_id'),subject_id:q.get('subject_id'),video_id:vid}))).json();
          url=s2.video_url||s2.hls_url;
        }
      }
    }
    if(url){
      msg.textContent='';
      if(url.includes('.mpd')&&window.shaka){
        const shakaPlayer=new shaka.Player(el);
        await shakaPlayer.load(url);
      }else{ el.src=url; }
      return;
    }
  }catch(e){ console.error(e); }
  showExternal();
})();
</script>
{% endblock %}
