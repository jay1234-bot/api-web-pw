<!DOCTYPE html>
<html lang="en" oncontextmenu="return false">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <title>Rarestudy DRM Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/plyr/3.7.8/plyr.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Yatra+One&display=swap');

        :root {
            --primary-color: #ffd700;
            --accent-color: #ff9000;
            --text-glow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        * {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
        }

        .header {
            text-align: center;
            width: 100%;
            padding: 5px 0;
        }

        .divine-text {
            font-family: 'Yatra One', cursive;
            font-size: 2em;
            color: var(--primary-color);
            text-shadow: var(--text-glow);
            margin: 0;
            animation: divine-glow 3s infinite;
        }

        @keyframes divine-glow {
            0%, 100% { text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
            50% { text-shadow: 0 0 20px rgba(255, 215, 0, 0.8); }
        }

        .ornament {
            font-size: 1.5em;
            color: var(--accent-color);
            margin: 0 10px;
        }

        .video-container {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            width: 95%;
            max-width: 1400px;
            aspect-ratio: 16/9;
            margin: 10px auto;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        #player {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        .plyr__controls {
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.7)) !important;
        }

        .plyr__control--overlaid {
            background: var(--primary-color) !important;
        }

        .plyr--video .plyr__control:hover {
            background: var(--accent-color) !important;
        }

        .plyr--full-ui input[type=range] {
            color: var(--primary-color) !important;
        }

        .status-message {
            margin: 20px auto;
            max-width: 800px;
            width: 90%;
            padding: 15px 20px;
            border-radius: 10px;
            text-align: center;
            font-weight: 500;
            display: none;
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            color: #ff4444;
            backdrop-filter: blur(5px);
        }

        .loading-message {
            background: rgba(255, 215, 0, 0.1) !important;
            border: 1px solid rgba(255, 215, 0, 0.3) !important;
            color: #ffd700 !important;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 0 15px;
            width: 100%;
            box-sizing: border-box;
            margin: 10px 0;
        }

        .action-btn {
            width: 100%;
            min-height: 50px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            overflow: hidden;
            text-align: center;
            border: 2px solid transparent;
            margin: 0;
            padding: 8px 15px;
            font-size: 0.9em;
            box-sizing: border-box;
            gap: 10px;
        }

        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.4);
            border-color: var(--primary-color);
        }

        .telegram-btn {
            background: linear-gradient(135deg, #0088cc 0%, #8057f5 100%);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(0, 136, 204, 0.5);
        }

        .help-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            box-shadow: 0 10px 20px -10px rgba(40, 167, 69, 0.5);
        }

        .shlokas-container {
            text-align: center;
            padding: 10px;
            width: 100%;
            box-sizing: border-box;
            background: linear-gradient(to right, transparent, rgba(255, 215, 0, 0.05), transparent);
        }

        .shloka {
            margin: 0;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.1);
        }

        .shloka-text {
            font-family: 'Yatra One', cursive;
            font-size: 1em;
            color: #ffd700;
            line-height: 1.5;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-right: 10px;
            color: white;
        }

        .live-dot {
            animation: live-blink 1s infinite;
        }

        @keyframes live-blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.5; }
        }

        .plyr__menu__container {
            background: rgba(0, 0, 0, 0.95) !important;
            max-height: 300px !important;
            overflow-y: auto !important;
        }

        .plyr__menu__container .plyr__control {
            color: white !important;
            font-weight: 500 !important;
        }

        @media (max-width: 768px) {
            .main-container { padding: 10px; gap: 10px; }
            .plyr__menu__container { max-height: 150px !important; }
        }

        @media (max-width: 480px) {
            .main-container { padding: 5px; gap: 8px; }
            .divine-text { font-size: 1.3em; }
            .video-container { width: 100%; margin: 3px auto; }
            .action-buttons { padding: 0 5px; gap: 8px; margin: 3px 0; }
            .action-btn { min-height: 40px; font-size: 0.75em; padding: 5px; }
            .plyr__menu__container { max-height: 120px !important; }
        }
    </style>
</head>
<body onkeydown="return false">
    <div class="main-container">
        <div class="header">
            <h1 class="divine-text"><span class="ornament">॥</span> जय श्री कृष्ण <span class="ornament">॥</span></h1>
        </div>

        <div class="video-container">
            <video id="player" playsinline preload="none"></video>
        </div>
        
        <div class="status-message" id="statusMessage"></div>
        
        <div class="action-buttons">
            <button class="action-btn telegram-btn" onclick="openTelegramLink()">

            <button class="action-btn help-btn" onclick="openSupportLink()">
                <i class="fa-solid fa-shield-halved"></i>
                Help Support
            </button>
        </div>
    
        <div class="shlokas-container">
            <div class="shloka">
                <div class="shloka-text">
                    कृष्णाय वासुदेवाय हरये परमात्मने<br/>

                </div>
            </div>
        </div>
    </div>
